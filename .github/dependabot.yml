
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "chore(ci): "
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
